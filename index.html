<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE: Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Video Background -->
    <video class="video" autoplay muted loop>
        <source src="https://videos.pexels.com/video-files/1851190/1851190-uhd_2560_1440_25fps.mp4" type="video/mp4">
    </video>

    <!-- Header -->
    <header class="head">
        <div class="logo">
            <a href="#"><img src="CORE.png" alt="CORE Logo"></a>
        </div>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About CORE</a>
            <a href="team.html">Our Team</a>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="main">
        <h1>Welcome To CORE</h1>
        <h3>Cipher Operated Rocket Execution</h3>
    </div>

    <!-- Buttons -->
    <div class="button-container">
        <!-- Button 1: GitHub -->
        <a href="https://github.com/R09Aditya/CORE" target="_blank" class="btn">
            Get Started
        </a>

        <!-- Button 2: Run Script -->
        <button class="btn" onclick="runCoreScript()">
            Run CORE Script
        </button>
    </div>

    <script>
    async function runCoreScript() {
        const response = await fetch('/run-core', {
            method: 'POST'
        });
        const result = await response.json();
        alert(result.output || result.error || result.message);
    }
    </script>
</body>
</html>
